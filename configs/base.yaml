# Shared defaults. Merged with configs/framework/<fw>.yaml then
# configs/experiment/<exp>.yaml, then CLI overrides (train.py).

arch: resnet50
data: ./pred_ssl/datasets/imagenet100
epochs: 500
batch_size: 256
workers: 8
momentum: 0.9
weight_decay: 1.0e-4
seed: 42
save_dir: ./checkpoints/default
save_freq: 10                  # checkpoint_last (rolling) + milestones cadence, in epochs
async_checkpoint: true         # write checkpoints on a background thread (false = synchronous)
print_freq: 20

# Optimizer + learning-rate control.
optimizer: sgd                 # sgd | lars  (lars: bias/norm excluded from wd+adaptation)
lr: 0.3
lr_scale_by_batch: true        # lr *= batch_size / 256
lr_schedule: cosine            # cosine | step
schedule: [300, 400]           # step-decay milestones (used only when lr_schedule == step)
warmup_epochs: 0               # linear LR warmup over the first N epochs (0 = off)

# Relational head.
rel_lambda: 0.5                # experiment overrides: baseline -> 0.0
rel_head_hidden: 2048
rel_decoupled: false           # true -> SSL pair stays standard; a SEPARATE pair feeds the head
# The head emits one logit per augmentation factor; the factor set (and its count)
# is owned by data/transforms.py FACTORS, so there is nothing to configure here.

# Pretraining kNN monitor: every N epochs, score the frozen features with a weighted
# kNN on the val split (logged as "KNN_Acc: x%"; drives checkpoint_best.pth.tar).
knn_eval_freq: 5               # 0 = off ('best' then falls back to lowest train loss)
knn_k: 20
knn_temp: 0.07
knn_per_class: 100             # train-bank images per class

# Latent split (disentanglement, experiment relpred_split). Off by default: both
# heads see the full h. On: h is partitioned into [vanilla | common | rel]; the SSL
# head consumes vanilla+common, the relational head consumes common+rel.
feat_split: false
split_ratios: [0.5, 0.25, 0.25]  # [vanilla, common, rel] fractions of feat_dim, sum = 1
split_decov_lambda: 0.0          # >0 adds a cross-correlation penalty between the two EXCLUSIVE blocks

# Augmentation.
aug_sharing: true              # true -> RelPairTransform; false -> StandardTwoViewTransform
crop_scale: [0.2, 1.0]
color_strength: 1.0
p_same: 0.5
blur_mode: sigma               # sigma | binary
# crop is the max IoU allowed between "different" crop boxes (keep >= crop_scale[0]).
delta: {brightness: 0.2, contrast: 0.2, saturation: 0.2, hue: 0.05, blur: 0.4, crop: 0.4}
# used only by the standard (baseline) transform:
use_rotation: false
use_color: true

# Projection head (all frameworks). native -> each framework's original head (default,
# reproduces reference numbers byte-for-byte); custom -> a shared MLP sized by proj_*.
proj_preset: native            # native | custom
proj_layers: 2                 # number of Linear layers (custom mode)
proj_hidden: 2048              # hidden width (custom mode)
proj_out: 256                  # output dim (custom mode; drives MoCo/LooC queue + BYOL predictor)
proj_bn: true                  # BatchNorm between layers (custom mode)

framework: simclr              # overridden by configs/framework/<fw>.yaml
